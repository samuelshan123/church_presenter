<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presenter</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400..800&display=swap');

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle, rgb(34, 34, 34), black);
      font-family: "Baloo Thambi 2", system-ui;
      font-optical-sizing: auto;
      position: relative;
      overflow: hidden;
    }

    #background-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      display: none;
    }

    #background-image.portrait {
      object-fit: contain;
      object-position: center;
    }

    #background-image.landscape {
      object-fit: cover;
      object-position: center;
    }

    #background-image.fullscreen {
      object-fit: cover;
    }

    #content-image {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      display: none;
      transition: transform 0.3s ease;
      transform-origin: center center;
    }

    #content-image.cover {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #content-image.contain {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
    }

    #content-image.fill {
      width: 100vw;
      height: 100vh;
      object-fit: fill;
    }

    #content-image.original {
      width: auto;
      height: auto;
      object-fit: none;
    }

    #text-container {
      width: 100vw;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      position: relative;
      z-index: 1;
      overflow: hidden;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #text-container.bible-mode {
      justify-content: center;
    }

    #content {
      width: 100%;
      font-weight: bold;
      color: #fff;
      text-align: center;
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1.4;
      word-break: break-word;
      overflow: hidden;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.25), 0 1px 0 #fff;
      position: relative;
      z-index: 1;
    }

    #book {
      width: 100%;
      flex-shrink: 0;
      font-weight: bold;
      color: #fff;
      text-align: center;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      margin-bottom: 1em;
      line-height: 1.1;
      overflow: visible;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.25), 0 1px 0 #fff;
      position: relative;
      z-index: 1;
    }
  </style>
</head>

<body>
  <img id="background-image" alt="Background">
  <img id="content-image" alt="Content Image">

  <div id="text-container">
    <div id="book"></div>
    <div id="content"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/textfit@2.4.0/textFit.min.js"></script>

  <script>
    let socket;
    let reconnectDelay = 1000;
    const maxReconnectDelay = 30000;
    let reconnectTimer = null;

    let latestType = null;
    let latestConfig = {};

    function getDefaultContentFontSize(config) {
      if (config.fontSize && config.fontSize !== "default") {
        return Number(config.fontSize);
      }

      const min = 32;
      const preferred = window.innerWidth * 0.06;
      const max = 56;

      return Math.max(min, Math.min(preferred, max));
    }

    function getDefaultBookFontSize(config) {
      if (config.fontSize && config.fontSize !== "default") {
        return Number(config.fontSize) * 0.55;
      }

      const min = 18;
      const preferred = window.innerWidth * 0.03;
      const max = 32;

      return Math.max(min, Math.min(preferred, max));
    }

    function resetFontSize(type, config) {
      const contentEl = document.getElementById("content");
      const bookEl = document.getElementById("book");

      contentEl.style.height = "";
      contentEl.style.maxHeight = "";
      contentEl.style.display = "";
      bookEl.style.display = "";
      bookEl.style.visibility = "";
      bookEl.style.height = "";

      if (config.fontSize && config.fontSize !== "default") {
        contentEl.style.fontSize = Number(config.fontSize) + "px";
        bookEl.style.fontSize = (Number(config.fontSize) * 0.7) + "px";
      } else {
        contentEl.style.fontSize = "clamp(2rem, 6vw, 3.5rem)";
        bookEl.style.fontSize = "clamp(1.5rem, 4vw, 2.5rem)";
      }
    }

    function applyTextFit(type, config) {
      if (type === "image") return;

      const contentEl = document.getElementById("content");
      const bookEl = document.getElementById("book");
      const textContainer = document.getElementById("text-container");

      resetFontSize(type, config);

      const defaultContentFontSize = getDefaultContentFontSize(config);
      const defaultBookFontSize = getDefaultBookFontSize(config);

      if (type === "bible") {
        textContainer.classList.add("bible-mode");

        bookEl.style.display = "block";
        bookEl.style.visibility = "visible";
        bookEl.style.height = "auto";

        contentEl.style.height = "auto";
        contentEl.style.maxHeight = "none";
        contentEl.style.overflow = "visible";

        requestAnimationFrame(() => {
          let bookFontSize = defaultBookFontSize;
          let contentFontSize = defaultContentFontSize;

          const minBookFontSize = 12;
          const minContentFontSize = 14;

          bookEl.style.fontSize = bookFontSize + "px";
          contentEl.style.fontSize = contentFontSize + "px";

          while (
            textContainer.scrollHeight > textContainer.clientHeight &&
            contentFontSize > minContentFontSize
          ) {
            contentFontSize -= 1;
            contentEl.style.fontSize = contentFontSize + "px";
          }

          while (
            textContainer.scrollHeight > textContainer.clientHeight &&
            bookFontSize > minBookFontSize
          ) {
            bookFontSize -= 1;
            bookEl.style.fontSize = bookFontSize + "px";
          }
        });

        return;
      }

      textContainer.classList.remove("bible-mode");
      bookEl.style.display = "none";
      contentEl.style.overflow = "hidden";

      requestAnimationFrame(() => {
        const containerStyle = window.getComputedStyle(textContainer);
        const paddingTop = parseFloat(containerStyle.paddingTop) || 0;
        const paddingBottom = parseFloat(containerStyle.paddingBottom) || 0;

        const availableHeight =
          textContainer.clientHeight -
          paddingTop -
          paddingBottom;

        contentEl.style.height = Math.max(120, availableHeight) + "px";

        textFit(contentEl, {
          minFontSize: 14,
          maxFontSize: defaultContentFontSize,
          multiLine: true,
          widthOnly: false,
          alignHoriz: true,
          alignVert: true
        });
      });
    }

    function scheduleReconnect() {
      if (reconnectTimer) clearTimeout(reconnectTimer);

      const jitteredDelay = reconnectDelay * (0.8 + Math.random() * 0.4);
      console.log(`WebSocket: reconnecting in ${Math.round(jitteredDelay / 1000)}s...`);

      reconnectTimer = setTimeout(connectWebSocket, jitteredDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
    }

    function connectWebSocket() {
      if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) {
        return;
      }

      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      socket = new WebSocket(`${protocol}//${location.host}/api/ws`);

      socket.onopen = function () {
        console.log('WebSocket connected');
        reconnectDelay = 1000;

        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
      };

      socket.onmessage = function (event) {
        try {
          const data = JSON.parse(event.data);
          console.log(data);

          let type = data.type;
          let config = data.config || {};
          let background = data.background || {};
          let imageConfig = data.imageConfig || {};
          let metadata = data.metadata || {};
          let msg = data.content;

          if (!msg) msg = "";

          const body = document.body;
          const contentEl = document.getElementById("content");
          const bookEl = document.getElementById("book");
          const bgImage = document.getElementById("background-image");
          const contentImage = document.getElementById("content-image");
          const textContainer = document.getElementById("text-container");

          if (type === 'image' && metadata.imagePath) {
            textContainer.classList.remove("bible-mode");

            const encodedPath = encodeURIComponent(metadata.imagePath);

            contentImage.src = `/api/image/${encodedPath}`;
            contentImage.style.display = 'block';
            textContainer.style.display = 'none';

            const displayMode = imageConfig.displayMode || 'contain';
            const zoomLevel = imageConfig.zoomLevel || 1.0;

            console.log('Image Config:', {
              displayMode: displayMode,
              zoomLevel: zoomLevel,
              imagePath: metadata.imagePath
            });

            contentImage.classList.remove('cover', 'contain', 'fill', 'original');
            contentImage.classList.add(displayMode);

            contentImage.style.transform = `translate(-50%, -50%) scale(${zoomLevel})`;
          } else {
            contentImage.style.display = 'none';
            textContainer.style.display = 'flex';
          }

          if (background.imagePath) {
            bgImage.src = '/api/background?t=' + Date.now();
            bgImage.style.display = 'block';

            bgImage.classList.remove('fullscreen', 'portrait', 'landscape');

            if (background.displayType) {
              bgImage.classList.add(background.displayType);
            } else {
              bgImage.classList.add('fullscreen');
            }
          } else {
            bgImage.style.display = 'none';
            bgImage.src = '';
          }

          if (config.bg && config.bg !== "default") {
            body.style.background = config.bg;
          } else {
            body.style.background = "radial-gradient(circle, rgb(34, 34, 34), black)";
          }

          if (config.fg && config.fg !== "default") {
            contentEl.style.color = config.fg;
            bookEl.style.color = config.fg;
          } else {
            contentEl.style.color = "#fff";
            bookEl.style.color = "#fff";
          }

          if (config.fontSize && config.fontSize !== "default") {
            contentEl.style.fontSize = config.fontSize + "px";
            bookEl.style.fontSize = (config.fontSize * 0.7) + "px";
          } else {
            contentEl.style.fontSize = "clamp(2rem, 6vw, 3.5rem)";
            bookEl.style.fontSize = "clamp(1.5rem, 4vw, 2.5rem)";
          }

          if (config.font && config.font !== "default") {
            body.style.fontFamily = config.font;
          } else {
            body.style.fontFamily = '"Baloo Thambi 2", system-ui';
          }

          bookEl.innerText = (type === 'bible' && metadata.book) ? metadata.book : '';
          contentEl.innerText = msg;

          latestType = type;
          latestConfig = config;

          applyTextFit(type, config);

        } catch (err) {
          console.error('Parse error:', err);
        }
      };

      socket.onclose = function (event) {
        console.log(`WebSocket disconnected (code: ${event.code})`);
        scheduleReconnect();
      };

      socket.onerror = function (error) {
        console.error('WebSocket error:', error);
      };
    }

    document.addEventListener('visibilitychange', function () {
      if (!document.hidden && (!socket || socket.readyState === WebSocket.CLOSED || socket.readyState === WebSocket.CLOSING)) {
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }

        reconnectDelay = 1000;
        connectWebSocket();
      }
    });

    window.addEventListener("resize", function () {
      const contentEl = document.getElementById("content");
      const bookEl = document.getElementById("book");

      if (contentEl.innerText.trim() || bookEl.innerText.trim()) {
        applyTextFit(latestType || "song", latestConfig || {});
      }
    });

    connectWebSocket();
  </script>
</body>

</html>
